<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UBG ULTRA - Browser In Development</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      height: 100%; 
      font-family: 'Inter', sans-serif; 
      color: #222; 
      overflow-x: hidden;
    }
    body { 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh;
      padding: 20px;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at 20% 50%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(30, 144, 255, 0.15) 0%, transparent 50%),
                  #0a0e27;
      z-index: -2;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes drift {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-20px) translateX(10px); }
    }
    .space-stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }
    .star.small { width: 1px; height: 1px; }
    .star.medium { width: 2px; height: 2px; }
    .star.large { width: 3px; height: 3px; }
    .nebula {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: drift 20s infinite ease-in-out;
    }
    .nebula.purple {
      width: 300px;
      height: 300px;
      background: rgba(138, 43, 226, 0.4);
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }
    .nebula.blue {
      width: 250px;
      height: 250px;
      background: rgba(30, 144, 255, 0.4);
      top: 50%;
      right: 10%;
      animation-delay: 2s;
    }
    .nebula.cyan {
      width: 280px;
      height: 280px;
      background: rgba(0, 255, 255, 0.3);
      bottom: 10%;
      left: 20%;
      animation-delay: 4s;
    }
    .page {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 24px;
      position: relative;
      z-index: 10;
    }
    .home-hero, .browse-hero {
      width: 100%;
      max-width: 420px;
      background: rgba(20, 25, 45, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 48px 32px;
      box-shadow: 0 8px 32px rgba(127, 90, 240, 0.2), 0 0 40px rgba(30, 144, 255, 0.1);
      border: 1px solid rgba(127, 90, 240, 0.2);
      text-align: center;
    }
    .logo-home, .logo-browse {
      font-size: 2.2em;
      font-weight: 800;
      background: linear-gradient(120deg, #7f5af0 0%, #36cce4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 18px;
    }
    .browse-text {
      font-size: 1.1em;
      color: #a0b0c0;
      margin-bottom: 36px;
      font-weight: 500;
    }

    .iframe-container {
      width: 100%;
      max-width: 370px;
      height: 540px;
      margin: 0 auto;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(127, 90, 240, 0.21), 0 0 40px rgba(30, 144, 255, 0.12);
      border: 1px solid rgba(127,90,240,0.18);
      background: #191a2d;
    }
    .iframe-browser {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
      display: block;
    }
    @media (max-width: 540px) {
      .page { padding: 30px 16px; }
      .browse-hero { padding: 40px 8px; border-radius: 16px; }
      .logo-browse { font-size: 1.5em; }
      .iframe-container { height: 340px; max-width: 99vw;}
    }
  </style>
</head>
<body>
  <!-- ANIMATED SPACE BACKGROUND -->
  <div class="space-stars">
    <div class="nebula purple"></div>
    <div class="nebula blue"></div>
    <div class="nebula cyan"></div>
  </div>
  <div class="page">
    <div class="browse-hero">
      <div class="logo-browse">UBG ULTRA</div>
      <div class="browse-text">
        Browser is in development!<br>
        Use our friend Code Universe's instead!
      </div>
      <div class="iframe-container">
        <iframe
          class="iframe-browser"
          src="https://universe.gace.space/sirco-os/"
          allow="fullscreen"
          loading="lazy"
          title="Aurora Browser"
        ></iframe>
      </div>
    </div>
  </div>
  <script>
    // Generate stars dynamically
    function generateStars() {
      const container = document.querySelector('.space-stars');
      const starCount = 100;
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        const size = Math.random() > 0.5 ? 'small' : (Math.random() > 0.5 ? 'medium' : 'large');
        star.className = `star ${size}`;
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = (Math.random() * 3) + 's';
        container.appendChild(star);
      }
    }
    generateStars();
  </script>
</body>
</html>
